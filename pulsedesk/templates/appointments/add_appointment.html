{% extends 'base.html' %}
{% block title %}New Appointment — PulseDesk{% endblock %}
{% block nav_appointments %}active{% endblock %}

{% block content %}
<div class="topbar">
  <div>
    <h1>New Appointment</h1>
    <p>Book a new appointment</p>
  </div>
  <a href="{% url 'appointment_list' %}" class="btn-back">← Back</a>
</div>

<div class="form-card">
  <form method="POST">
    {% csrf_token %}
    <div class="frow">
      <div class="fg">
        <label class="flbl">Patient *</label>
        <select name="patient" class="fc" required>
          <option value="">Select patient</option>
          {% for p in patients %}
          <option value="{{ p.id }}">{{ p.user.get_full_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="fg">
        <label class="flbl">Doctor *</label>
        <select name="doctor" class="fc" required>
          <option value="">Select doctor</option>
          {% for d in doctors %}
          <option value="{{ d.id }}">Dr. {{ d.user.get_full_name }} — {{ d.specialization }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flbl">Date *</label>
        <input type="date" name="appointment_date" class="fc" min="{{ today }}" required/>
      </div>
      <div class="fg">
        <label class="flbl">Time *</label>
        <input type="time" name="appointment_time" class="fc" required onfocus="this.showPicker()"/>
      </div>
    </div>
    <div class="fg">
      <label class="flbl">Appointment Type</label>
      <select name="appointment_type" class="fc">
        <option value="general">General Checkup</option>
        <option value="followup">Follow Up</option>
        <option value="emergency">Emergency</option>
        <option value="specialist">Specialist</option>
        <option value="lab">Lab Test</option>
      </select>
    </div>
    <div class="fg">
      <label class="flbl">Reason</label>
      <textarea name="reason" class="fc" placeholder="Reason for visit..."></textarea>
    </div>
    <div class="fg">
      <label class="flbl">Notes</label>
      <textarea name="notes" class="fc" placeholder="Additional notes..."></textarea>
    </div>
    <div style="display:flex;gap:.75rem;margin-top:.5rem">
      <a href="{% url 'appointment_list' %}" class="btn-back">Cancel</a>
      <button type="submit" class="btn-save">Book Appointment →</button>
    </div>
  </form>
</div>
{% endblock %}
